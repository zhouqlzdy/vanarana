name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o vanarana-linux-${{ matrix.goarch }} ./cmd/server/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanarana-linux-${{ matrix.goarch }}
          path: vanarana-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vanarana-linux-*
          merge-multiple: true

      - name: Checksum
        run: sha256sum vanarana-linux-* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            vanarana-linux-amd64
            vanarana-linux-arm64
            checksums.txt
          generate_release_notes: true
